<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Management - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-cog"></i> Admin Panel</h2>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="projects.html" class="nav-item active">
                    <i class="fas fa-folder"></i>
                    <span>Projects</span>
                </a>
                <a href="skills.html" class="nav-item">
                    <i class="fas fa-code"></i>
                    <span>Skills</span>
                </a>
                <a href="experience.html" class="nav-item">
                    <i class="fas fa-briefcase"></i>
                    <span>Experience</span>
                </a>
                <a href="messages.html" class="nav-item">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                    <span class="badge" id="message-count">0</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="../index.html" class="nav-item">
                    <i class="fas fa-external-link-alt"></i>
                    <span>View Website</span>
                </a>
                <button class="nav-item logout-btn" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <button class="sidebar-toggle mobile-only" id="mobile-sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Projects Management</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="add-project-btn">
                        <i class="fas fa-plus"></i>
                        Add New Project
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <!-- Projects List -->
                <div class="projects-list" id="projects-list">
                    <!-- Projects will be loaded dynamically -->
                </div>

                <!-- Add/Edit Project Modal -->
                <div class="modal" id="project-modal">
                    <div class="modal-content large">
                        <div class="modal-header">
                            <h2 id="modal-title">Add New Project</h2>
                            <span class="close-modal" id="close-modal">&times;</span>
                        </div>
                        <form class="project-form" id="project-form">
                            <input type="hidden" id="project-id">
                            
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="project-title">Project Title *</label>
                                    <input type="text" id="project-title" name="title" required>
                                </div>
                                <div class="form-group">
                                    <label for="project-category">Category *</label>
                                    <select id="project-category" name="category" required>
                                        <option value="">Select category</option>
                                        <option value="web">Web Design</option>
                                        <option value="mobile">Mobile Apps</option>
                                        <option value="frontend">Frontend</option>
                                        <option value="backend">Backend</option>
                                        <option value="fullstack">Full Stack</option>
                                        <option value="ui-ux">UI/UX Design</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="project-description">Short Description *</label>
                                <textarea id="project-description" name="description" rows="3" required></textarea>
                            </div>

                            <div class="form-group">
                                <label for="project-details">Detailed Description</label>
                                <textarea id="project-details" name="details" rows="6"></textarea>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="project-tech">Technologies Used</label>
                                    <input type="text" id="project-tech" name="technologies" placeholder="React, Node.js, MongoDB">
                                </div>
                                <div class="form-group">
                                    <label for="project-duration">Duration</label>
                                    <input type="text" id="project-duration" name="duration" placeholder="3 months">
                                </div>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="project-client">Client/Company</label>
                                    <input type="text" id="project-client" name="client">
                                </div>
                                <div class="form-group">
                                    <label for="project-year">Year</label>
                                    <input type="number" id="project-year" name="year" min="2000" max="2030">
                                </div>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="project-demo">Demo URL</label>
                                    <input type="url" id="project-demo" name="demoUrl" placeholder="https://project-demo.com">
                                </div>
                                <div class="form-group">
                                    <label for="project-github">GitHub URL</label>
                                    <input type="url" id="project-github" name="githubUrl" placeholder="https://github.com/username/project">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="project-image">Project Image</label>
                                <div class="image-upload">
                                    <div class="image-preview" id="project-image-preview">
                                        <i class="fas fa-image"></i>
                                    </div>
                                    <input type="file" id="project-image" accept="image/*">
                                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('project-image').click()">
                                        <i class="fas fa-upload"></i>
                                        Upload Image
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="project-featured" name="featured">
                                    <span class="checkmark"></span>
                                    Feature this project on homepage
                                </label>
                            </div>

                            <div class="modal-actions">
                                <button type="button" class="btn btn-secondary" id="cancel-project">Cancel</button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i>
                                    Save Project
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Delete Confirmation Modal -->
                <div class="modal" id="delete-modal">
                    <div class="modal-content small">
                        <div class="modal-header">
                            <h2>Confirm Delete</h2>
                            <span class="close-modal" id="close-delete-modal">&times;</span>
                        </div>
                        <div class="modal-body">
                            <p>Are you sure you want to delete this project? This action cannot be undone.</p>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn btn-secondary" id="cancel-delete">Cancel</button>
                            <button type="button" class="btn btn-danger" id="confirm-delete">
                                <i class="fas fa-trash"></i>
                                Delete Project
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="success-message" id="success-message">
        <i class="fas fa-check-circle"></i>
        <span>Project saved successfully!</span>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/projects-admin.js"></script>
</body>
</html>
